name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            doctest-dev \
            libcurl4-openssl-dev

      - name: Build and run desktop tests
        run: make -j"$(nproc)" test

  build-tools:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            doctest-dev \
            libcurl4-openssl-dev

      - name: Build tools and examples
        run: make -j"$(nproc)" examples repair-tool appendlog-diag doctor-dump profiling sim

  docs:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint docs
        run: markdownlint docs/
