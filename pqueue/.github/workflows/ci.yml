name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            doctest-dev \
            libcurl4-openssl-dev

      - name: Build and run desktop tests
        run: make -j"$(nproc)" test

  build-tools:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            doctest-dev \
            libcurl4-openssl-dev

      - name: Build tools and examples
        run: make -j"$(nproc)" examples repair-tool appendlog-diag doctor-dump sim

  benchmark:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            doctest-dev \
            libcurl4-openssl-dev

      - name: Build benchmark
        run: make -j"$(nproc)" benchmark

      - name: Run benchmark
        run: ./build/pqueue-benchmark --json --strict --repeat 5 > /tmp/benchmark-current.json

      - name: Regression check
        run: python3 tools/benchmark_regression.py data/benchmark-results-posix.json /tmp/benchmark-current.json

  docs:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint docs
        run: markdownlint docs/
