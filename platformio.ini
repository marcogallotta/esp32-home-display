[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^6
    h2zero/NimBLE-Arduino
    https://github.com/marcogallotta/PrayerTimes.git
    olikraus/U8g2
    symlink://pqueue
    symlink://third_party/FormatLog

build_unflags =
  -std=gnu++11

build_flags =
    -Isrc
    -Ipqueue/src
    -std=gnu++17

board_build.filesystem = littlefs
board_build.partitions = no_ota.csv

build_src_filter =
    +<*>
    -<log_download_main.cpp>

[env:esp32s3-debug]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DLOG_LEVEL=APP_LOG_LEVEL_DEBUG

[env:esp32s3-log-download]
extends = env:esp32s3
build_src_filter =
    -<*>
    +<log_download_main.cpp>

