[platformio]
default_envs = esp32s3-compaction
test_dir = tests/arduino

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    symlink://.

build_unflags =
  -std=gnu++11

build_flags =
    -std=gnu++17
    -Isrc

build_src_filter =
    +<src/>
    -<tools/>
    -<tests/>
    -<build/>

board_build.filesystem = littlefs

[env:esp32s3-compaction]
extends = env:esp32s3
test_filter = test_pqueue_compaction

[env:esp32s3-littlefs]
extends = env:esp32s3
test_filter = test_pqueue_littlefs

[env:esp32s3-littlefs-slow]
extends = env:esp32s3
test_filter = test_pqueue_littlefs_slow

[env:esp32s3-littlefs-soak]
extends = env:esp32s3
test_filter = test_pqueue_littlefs_soak

[env:esp32s3-spool-transfer]
extends = env:esp32s3
build_src_filter =
    +<src/>
    +<tools/esp32_spool_transfer/main.cpp>
    -<tests/>
    -<build/>

[env:esp32s3-profiling]
extends = env:esp32s3
build_src_filter =
    -<src/>
    +<tools/pqueue_profiling_main.cpp>
    -<tests/>
    -<build/>
