services:
  db-test:
    image: postgres:16
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test"]
      interval: 2s
      retries: 10

  test:
    build: .
    environment:
      ENV: test
      API_KEY: test-api-key
      SESSION_SECRET: test-session-secret
      DASHBOARD_PASSWORD: test-dashboard-password
      SESSION_SECURE: "false"
      DATABASE_HOST: db-test
      DATABASE_PORT: 5432
      DATABASE_NAME: test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: test
    volumes:
      - ./certs:/app/certs:ro
      - ./app:/app/app:ro
      - ./config:/app/config:ro
      - ./tests:/app/tests:ro
    depends_on:
      db-test:
        condition: service_healthy
    command: ["pytest", "-q"]
