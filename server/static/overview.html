<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Sensor Overview</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --border: #e3e6eb;
      --text: #13161a;
      --muted: #667085;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #b42318;
      --warning: #b54708;
      --ok: #027a48;
      --shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 32px;
      line-height: 1.1;
      margin: 0 0 6px;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .seg {
      display: inline-flex;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      box-shadow: var(--shadow);
    }
    .seg button {
      border: 0;
      background: transparent;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
    }
    .seg button.active {
      background: var(--accent);
      color: white;
    }
    select {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      padding: 10px 12px;
      font-size: 14px;
      box-shadow: var(--shadow);
    }
    .section-title {
      margin: 22px 0 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .sensor-card {
      padding: 16px;
      cursor: pointer;
      transition: 140ms ease;
    }
    .sensor-card:hover {
      transform: translateY(-1px);
    }
    .sensor-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow);
    }
    .sensor-card.static {
      cursor: default;
    }
    .sensor-card.static:hover {
      transform: none;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .sensor-name {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.ok { background: #ecfdf3; color: var(--ok); }
    .pill.warn { background: #fff7ed; color: var(--warning); }
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: #fcfcfd;
    }
    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
    }
    .charts {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .chart-card {
      padding: 16px;
    }
    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .chart-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }
    .chart-box {
      height: 320px;
      position: relative;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
    }
    .toggle-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }
    .ghost-btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--muted);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-size: 14px;
    }
    .ghost-btn:hover {
      color: var(--text);
    }
    .error-card {
      padding: 16px;
      color: var(--danger);
      margin-bottom: 14px;
      white-space: pre-wrap;
    }
    .loading-card {
      padding: 16px;
      margin-bottom: 14px;
    }
    @media (max-width: 700px) {
      .wrap { padding: 12px; }
      h1 { font-size: 26px; }
      .chart-box { height: 260px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // -------------------- config --------------------
    const CONFIG = {
      apiKey: 'happydevilelephantsmoking',
      staleAfterMs: 2 * 60 * 60 * 1000,
      rangeConfig: {
        '24h': { hours: 24, maxPoints: 96 },
        '3d':  { hours: 72, maxPoints: 144 },
        '7d':  { hours: 24 * 7, maxPoints: 196 },
        '30d': { hours: 24 * 30, maxPoints: 300 },
      },
      sensorTypeMeta: {
        switchbot: {
          latestFields: ['temperature_c', 'humidity_pct', 'absolute_humidity', 'vpd_air'],
          xMetricLabel: 'SwitchBot',
        },
        xiaomi: {
          latestFields: ['moisture_pct', 'light_lux'],
          xMetricLabel: 'Xiaomi',
        },
      },
    };

    // -------------------- api --------------------
    const api = {
      async fetchJson(url) {
        const res = await fetch(url, {
          headers: { 'X-api-key': CONFIG.apiKey }
        });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${await res.text()}`);
        }
        return res.json();
      },

      async fetchSensors() {
        return this.fetchJson('/sensors');
      },

      async fetchSensorReadings(sensorId, { startTs, endTs, maxPoints }) {
        const params = new URLSearchParams({
          start_ts: startTs,
          end_ts: endTs,
          max_points: String(maxPoints),
        });
        return this.fetchJson(`/sensors/${encodeURIComponent(sensorId)}/readings?${params.toString()}`);
      },
    };

    // -------------------- metrics --------------------
    const metrics = {
      round1(value) {
        return value == null ? null : Math.round(value * 10) / 10;
      },

      calcAbsoluteHumidity(tempC, rhPct) {
        if (tempC == null || rhPct == null) return null;
        const svp = 6.112 * Math.exp((17.67 * tempC) / (tempC + 243.5));
        const avp = svp * (rhPct / 100);
        return (2.1674 * avp) / (273.15 + tempC) * 100;
      },

      calcVpd(tempC, rhPct) {
        if (tempC == null || rhPct == null) return null;
        const svp = 0.6108 * Math.exp((17.27 * tempC) / (tempC + 237.3));
        return svp * (1 - rhPct / 100);
      },

      formatTemp(value) {
        return value == null ? '—' : `${metrics.round1(value).toFixed(1)}°C`;
      },

      formatPct(value) {
        return value == null ? '—' : `${Math.round(value)}%`;
      },

      formatAbsHumidity(value) {
        return value == null ? '—' : `${metrics.round1(value).toFixed(1)} g/m³`;
      },

      formatVpd(value) {
        return value == null ? '—' : `${metrics.round1(value).toFixed(1)} kPa`;
      },

      formatAgo(ts) {
        if (!ts) return 'No data';
        const diffMin = Math.round((Date.now() - new Date(ts).getTime()) / 60000);
        if (diffMin < 1) return 'just now';
        if (diffMin < 60) return `${diffMin}m ago`;
        const h = Math.round(diffMin / 60);
        if (h < 48) return `${h}h ago`;
        return `${Math.round(h / 24)}d ago`;
      },

      isStale(ts) {
        if (!ts) return true;
        return (Date.now() - new Date(ts).getTime()) > CONFIG.staleAfterMs;
      },
    };

    // -------------------- sensor model --------------------
    const sensorModel = {
      splitByType(sensors) {
        return {
          switchbot: sensors.filter(sensor => sensor.type === 'switchbot'),
          xiaomi: sensors.filter(sensor => sensor.type === 'xiaomi'),
        };
      },

      buildRangeWindow(range) {
        const cfg = CONFIG.rangeConfig[range] || CONFIG.rangeConfig['24h'];
        const endMs = Date.now();
        const startMs = endMs - cfg.hours * 60 * 60 * 1000;
        return {
          startMs,
          endMs,
          startTs: new Date(startMs).toISOString(),
          endTs: new Date(endMs).toISOString(),
          maxPoints: cfg.maxPoints,
        };
      },

      normalizeReadings(rows) {
        return rows.slice().reverse();
      },

      buildSwitchbotSummary(sensor, rows) {
        const latest = rows[rows.length - 1];
        const latestTemp = latest?.temperature_c ?? null;
        const latestHumidity = latest?.humidity_pct ?? null;
        const latestAbsoluteHumidity = metrics.calcAbsoluteHumidity(latestTemp, latestHumidity);
        const latestVpd = metrics.calcVpd(latestTemp, latestHumidity);

        return {
          ...sensor,
          latestTimestamp: latest?.timestamp,
          latestTempText: metrics.formatTemp(latestTemp),
          latestHumidityText: metrics.formatPct(latestHumidity),
          latestAbsoluteHumidityText: metrics.formatAbsHumidity(latestAbsoluteHumidity),
          latestVpdText: metrics.formatVpd(latestVpd),
        };
      },

      buildXiaomiSummary(sensor, rows) {
        const latest = rows[rows.length - 1];
        return {
          ...sensor,
          latestTimestamp: latest?.timestamp,
          latestMoisture: latest?.moisture_pct ?? null,
          latestLux: latest?.light_lux ?? null,
        };
      },
    };

    // -------------------- chart factory --------------------
    const chartFactory = {
      makeTimeScale(rangeWindow) {
        return {
          type: 'time',
          min: rangeWindow.startMs,
          max: rangeWindow.endMs,
          time: { tooltipFormat: 'yyyy-MM-dd HH:mm' }
        };
      },

      destroy(chartRef) {
        if (chartRef.current) {
          chartRef.current.destroy();
          chartRef.current = null;
        }
      },

      lineChart(canvas, chartRef, datasets, yLabel, rangeWindow) {
        this.destroy(chartRef);
        if (!canvas) return;

        chartRef.current = new Chart(canvas, {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            parsing: false,
            interaction: { mode: 'nearest', intersect: false },
            plugins: { legend: { display: true } },
            scales: {
              x: this.makeTimeScale(rangeWindow),
              y: { title: { display: true, text: yLabel } },
            },
          },
        });
      },

      timeSeriesDataset(label, rows, valueGetter) {
        return {
          label,
          data: rows
            .map(row => ({ x: new Date(row.timestamp), y: valueGetter(row) }))
            .filter(point => point.y != null),
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.15,
        };
      },
    };

    // -------------------- components --------------------
    function Card({ className = '', children, onClick }) {
      return <div className={`card ${className}`} onClick={onClick}>{children}</div>;
    }

    function SensorCard({ sensor, kind, selected, onClick, clickable = true }) {
      const stale = metrics.isStale(sensor.latestTimestamp);

      return (
        <Card
          className={`sensor-card ${selected ? 'selected' : ''} ${clickable ? '' : 'static'}`}
          onClick={clickable ? onClick : undefined}
        >
          <div className="row">
            <div>
              <div className="sensor-name">{sensor.name}</div>
              <div className="muted">Updated {metrics.formatAgo(sensor.latestTimestamp)}</div>
            </div>
            <div className={`pill ${stale ? 'warn' : 'ok'}`}>{stale ? 'Stale' : 'Live'}</div>
          </div>

          <div className="metric-grid">
            {kind === 'switchbot' ? (
              <>
                <div className="metric">
                  <div className="metric-label">Temp</div>
                  <div className="metric-value">{sensor.latestTempText}</div>
                </div>
                <div className="metric">
                  <div className="metric-label">Humidity</div>
                  <div className="metric-value">{sensor.latestHumidityText}</div>
                </div>
                <div className="metric">
                  <div className="metric-label">Abs humidity</div>
                  <div className="metric-value">{sensor.latestAbsoluteHumidityText}</div>
                </div>
                <div className="metric">
                  <div className="metric-label">VPD</div>
                  <div className="metric-value">{sensor.latestVpdText}</div>
                </div>
              </>
            ) : (
              <>
                <div className="metric">
                  <div className="metric-label">Moisture</div>
                  <div className="metric-value">
                    {sensor.latestMoisture == null ? '—' : `${Math.round(sensor.latestMoisture)}%`}
                  </div>
                </div>
                <div className="metric">
                  <div className="metric-label">Lux</div>
                  <div className="metric-value">
                    {sensor.latestLux == null ? '—' : sensor.latestLux}
                  </div>
                </div>
              </>
            )}
          </div>
        </Card>
      );
    }

    function ChartCard({ title, right, canvasRef }) {
      return (
        <Card className="chart-card">
          <div className="chart-head">
            <h3 className="chart-title">{title}</h3>
            {right}
          </div>
          <div className="chart-box">
            <canvas ref={canvasRef}></canvas>
          </div>
        </Card>
      );
    }

    // -------------------- app --------------------
    function App() {
      const [range, setRange] = React.useState('24h');
      const [selectedSensorId, setSelectedSensorId] = React.useState('all');
      const [xiaomiMetric, setXiaomiMetric] = React.useState('moisture_pct');
      const [showDerivedCharts, setShowDerivedCharts] = React.useState(false);

      const [sensors, setSensors] = React.useState([]);
      const [historyBySensorId, setHistoryBySensorId] = React.useState({});
      const [loadingSensors, setLoadingSensors] = React.useState(true);
      const [loadingHistory, setLoadingHistory] = React.useState(false);
      const [sensorError, setSensorError] = React.useState('');
      const [historyError, setHistoryError] = React.useState('');
      const [rangeWindow, setRangeWindow] = React.useState(sensorModel.buildRangeWindow('24h'));

      const tempCanvas = React.useRef(null);
      const humidityCanvas = React.useRef(null);
      const absHumidityCanvas = React.useRef(null);
      const vpdCanvas = React.useRef(null);
      const xiaomiCanvas = React.useRef(null);

      const tempChart = React.useRef(null);
      const humidityChart = React.useRef(null);
      const absHumidityChart = React.useRef(null);
      const vpdChart = React.useRef(null);
      const xiaomiChart = React.useRef(null);

      const sensorGroups = React.useMemo(() => sensorModel.splitByType(sensors), [sensors]);
      const switchbotSensors = sensorGroups.switchbot;
      const xiaomiSensors = sensorGroups.xiaomi;

      const selectedSwitchbotSensor = React.useMemo(() => {
        if (selectedSensorId === 'all') return null;
        return switchbotSensors.find(sensor => sensor.id === selectedSensorId) || null;
      }, [selectedSensorId, switchbotSensors]);

      React.useEffect(() => {
        async function loadSensors() {
          setLoadingSensors(true);
          setSensorError('');
          try {
            const loadedSensors = await api.fetchSensors();
            setSensors(loadedSensors);
          } catch (err) {
            setSensorError(String(err));
          } finally {
            setLoadingSensors(false);
          }
        }

        loadSensors();
      }, []);

      React.useEffect(() => {
        if (sensors.length === 0) return;

        async function loadHistory() {
          const nextRangeWindow = sensorModel.buildRangeWindow(range);
          setLoadingHistory(true);
          setHistoryError('');

          try {
            const entries = await Promise.all(
              sensors.map(async (sensor) => {
                const rows = await api.fetchSensorReadings(sensor.id, nextRangeWindow);
                return [sensor.id, sensorModel.normalizeReadings(rows)];
              })
            );

            setRangeWindow(nextRangeWindow);
            setHistoryBySensorId(Object.fromEntries(entries));
          } catch (err) {
            setHistoryError(String(err));
          } finally {
            setLoadingHistory(false);
          }
        }

        loadHistory();
      }, [range, sensors]);

      const switchbotSummary = React.useMemo(() => {
        return switchbotSensors.map(sensor => sensorModel.buildSwitchbotSummary(sensor, historyBySensorId[sensor.id] || []));
      }, [switchbotSensors, historyBySensorId]);

      const xiaomiSummary = React.useMemo(() => {
        return xiaomiSensors.map(sensor => sensorModel.buildXiaomiSummary(sensor, historyBySensorId[sensor.id] || []));
      }, [xiaomiSensors, historyBySensorId]);

      const switchbotSensorsToPlot = React.useMemo(() => {
        return selectedSwitchbotSensor ? [selectedSwitchbotSensor] : switchbotSensors;
      }, [selectedSwitchbotSensor, switchbotSensors]);

      React.useEffect(() => {
        const datasets = switchbotSensorsToPlot.map(sensor =>
          chartFactory.timeSeriesDataset(
            sensor.name,
            historyBySensorId[sensor.id] || [],
            row => row.temperature_c == null ? null : metrics.round1(row.temperature_c)
          )
        );
        chartFactory.lineChart(tempCanvas.current, tempChart, datasets, '°C', rangeWindow);
      }, [switchbotSensorsToPlot, historyBySensorId, rangeWindow]);

      React.useEffect(() => {
        const datasets = switchbotSensorsToPlot.map(sensor =>
          chartFactory.timeSeriesDataset(
            sensor.name,
            historyBySensorId[sensor.id] || [],
            row => row.humidity_pct == null ? null : Math.round(row.humidity_pct)
          )
        );
        chartFactory.lineChart(humidityCanvas.current, humidityChart, datasets, '%', rangeWindow);
      }, [switchbotSensorsToPlot, historyBySensorId, rangeWindow]);

      React.useEffect(() => {
        if (!showDerivedCharts) {
          chartFactory.destroy(absHumidityChart);
          return;
        }
        const datasets = switchbotSensorsToPlot.map(sensor =>
          chartFactory.timeSeriesDataset(
            sensor.name,
            historyBySensorId[sensor.id] || [],
            row => metrics.round1(metrics.calcAbsoluteHumidity(row.temperature_c, row.humidity_pct))
          )
        );
        chartFactory.lineChart(absHumidityCanvas.current, absHumidityChart, datasets, 'g/m³', rangeWindow);
      }, [showDerivedCharts, switchbotSensorsToPlot, historyBySensorId, rangeWindow]);

      React.useEffect(() => {
        if (!showDerivedCharts) {
          chartFactory.destroy(vpdChart);
          return;
        }
        const datasets = switchbotSensorsToPlot.map(sensor =>
          chartFactory.timeSeriesDataset(
            sensor.name,
            historyBySensorId[sensor.id] || [],
            row => metrics.round1(metrics.calcVpd(row.temperature_c, row.humidity_pct))
          )
        );
        chartFactory.lineChart(vpdCanvas.current, vpdChart, datasets, 'kPa', rangeWindow);
      }, [showDerivedCharts, switchbotSensorsToPlot, historyBySensorId, rangeWindow]);

      React.useEffect(() => {
        if (xiaomiSensors.length === 0) {
          chartFactory.destroy(xiaomiChart);
          return;
        }

        const sensor = xiaomiSensors[0];
        const datasets = [
          chartFactory.timeSeriesDataset(
            `${sensor.name} ${xiaomiMetric.replaceAll('_', ' ')}`,
            historyBySensorId[sensor.id] || [],
            row => row[xiaomiMetric]
          )
        ];
        chartFactory.lineChart(xiaomiCanvas.current, xiaomiChart, datasets, xiaomiMetric, rangeWindow);
      }, [xiaomiSensors, historyBySensorId, xiaomiMetric, rangeWindow]);

      const loading = loadingSensors || loadingHistory;
      const error = sensorError || historyError;

      return (
        <div className="wrap">
          <div className="topbar">
            <div>
              <h1>Sensor Overview</h1>
              <p className="sub">Cheap insight first. Decisions later.</p>
            </div>

            <div className="controls">
              <div className="seg">
                {Object.keys(CONFIG.rangeConfig).map(value => (
                  <button
                    key={value}
                    className={range === value ? 'active' : ''}
                    onClick={() => setRange(value)}
                  >
                    {value}
                  </button>
                ))}
              </div>

              <select value={selectedSensorId} onChange={(e) => setSelectedSensorId(e.target.value)}>
                <option value="all">All SwitchBot</option>
                {switchbotSensors.map(sensor => (
                  <option key={sensor.id} value={sensor.id}>{sensor.name}</option>
                ))}
              </select>
            </div>
          </div>

          {error && <div className="card error-card">{error}</div>}
          {loading && <div className="card loading-card">Loading…</div>}

          <div className="section-title">SwitchBot</div>
          <div className="sensor-grid">
            {switchbotSummary.map(sensor => (
              <SensorCard
                key={sensor.id}
                sensor={sensor}
                kind="switchbot"
                selected={selectedSensorId === sensor.id}
                onClick={() => setSelectedSensorId(selectedSensorId === sensor.id ? 'all' : sensor.id)}
                clickable={true}
              />
            ))}
          </div>

          <div className="section-title">Xiaomi</div>
          <div className="sensor-grid">
            {xiaomiSummary.map(sensor => (
              <SensorCard
                key={sensor.id}
                sensor={sensor}
                kind="xiaomi"
                selected={false}
                clickable={false}
              />
            ))}
          </div>

          <div className="charts">
            <ChartCard
              title="Temperature"
              right={<div className="hint">Overlay view for SwitchBot sensors</div>}
              canvasRef={tempCanvas}
            />

            <ChartCard
              title="Humidity"
              right={<div className="hint">Overlay view for SwitchBot sensors</div>}
              canvasRef={humidityCanvas}
            />

            <div className="toggle-row">
              <button className="ghost-btn" onClick={() => setShowDerivedCharts(v => !v)}>
                {showDerivedCharts ? 'Hide derived charts' : 'Show derived charts'}
              </button>
            </div>

            {showDerivedCharts && (
              <>
                <ChartCard
                  title="Absolute Humidity"
                  right={<div className="hint">Derived from air temp + RH</div>}
                  canvasRef={absHumidityCanvas}
                />
                <ChartCard
                  title="Air VPD"
                  right={<div className="hint">Derived from air temp + RH</div>}
                  canvasRef={vpdCanvas}
                />
              </>
            )}

            {xiaomiSensors.length > 0 && (
              <ChartCard
                title="Xiaomi Detail"
                right={
                  <select value={xiaomiMetric} onChange={(e) => setXiaomiMetric(e.target.value)}>
                    <option value="moisture_pct">Moisture</option>
                    <option value="light_lux">Lux</option>
                    <option value="conductivity_us_cm">Conductivity</option>
                    <option value="temperature_c">Temperature</option>
                  </select>
                }
                canvasRef={xiaomiCanvas}
              />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
