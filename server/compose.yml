services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 2s
      retries: 10

  app:
    build: .
    env_file: config/env
    volumes:
      - ./certs:/app/certs:ro
      - ./app:/app/app:ro
      - ./config:/app/config:ro
      - ./static:/app/static:ro
      - ./alembic:/app/alembic:ro
      - ./tools:/app/tools:ro
    command: ["uvicorn", "app.wsgi:app",
      "--host", "0.0.0.0",
      "--ssl-keyfile", "certs/key.pem",
      "--ssl-certfile", "certs/cert.pem",
      "--log-config", "config/logging.yaml",
      "--reload", "--reload-dir", "app", "--reload-dir", "static"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('https://laptop.local:8000/health', verify='/app/certs/cert.pem', timeout=3).status_code == 200 else 1)"]
      interval: 2s
      retries: 15
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - laptop.local

  levoit-controller:
    build: .
    env_file: config/env
    volumes:
      - ./certs:/app/certs:ro
      - ./app:/app/app:ro
      - ./config:/app/config:ro
      - ./tools:/app/tools:ro
      - vesync-data:/app/data
    command: ["python", "tools/run_levoit_ah_controller.py"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata-dev:
  vesync-data:
